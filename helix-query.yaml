version: 1
indices:
  default:
    include:
      - '/**'
    exclude:
      - '/configuration/**'
      - '/nav/**'
      - '/drafts/**'
      - '/footer/**'
    target: /stagwell-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, "content")
      description:
        select: head > meta[name="description"]
        value: attribute(el, "content")
      category:
        select: head > meta[name="category"]
        value: attribute(el, "content")
      section:
        select: head > meta[name="section"]
        value: attribute(el, "content")
